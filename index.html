<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="hud">
          <div>
            <p class="label">Score</p>
            <p class="value" id="score">0</p>
          </div>
          <div>
            <p class="label">Status</p>
            <p class="value" id="status">Ready</p>
          </div>
        </div>

        <div
          class="board"
          id="board"
          aria-label="Snake game board"
          role="grid"
        ></div>

        <div class="actions">
          <button id="start-button" type="button">Start</button>
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <div class="controls" aria-label="Touch controls">
          <button class="control-button" data-direction="up" type="button">Up</button>
          <div class="control-row">
            <button class="control-button" data-direction="left" type="button">Left</button>
            <button class="control-button" data-direction="down" type="button">Down</button>
            <button class="control-button" data-direction="right" type="button">Right</button>
          </div>
        </div>

        <p class="help">
          Use arrow keys or WASD to move. Press Space to pause or resume.
        </p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
