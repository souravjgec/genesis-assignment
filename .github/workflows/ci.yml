name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  APP_DIR: app
  IMAGE_NAME: genesis-items-api
  COVERAGE_THRESHOLD: "70"
  PYTHONPATH: .

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Write secret scan summary
        if: success()
        run: |
          {
            echo "### Secret Scan"
            echo "- Gitleaks completed with no blocking secrets detected."
          } >> "${GITHUB_STEP_SUMMARY}"

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs:
      - secret-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.APP_DIR }}/requirements-dev.txt

      - name: Install application dependencies
        run: pip install -r ${{ env.APP_DIR }}/requirements-dev.txt pip-audit

      - name: Run pip-audit
        run: pip-audit -r ${{ env.APP_DIR }}/requirements.txt

      - name: Write dependency audit summary
        if: success()
        run: |
          {
            echo "### Dependency Audit"
            echo "- pip-audit completed against runtime dependencies."
          } >> "${GITHUB_STEP_SUMMARY}"

  sast:
    name: SAST
    runs-on: ubuntu-latest
    needs:
      - secret-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: |
            p/default
            .semgrep/logging.yml
          generateSarif: "1"

      - name: Upload Semgrep SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn

      - name: Upload SARIF to GitHub code scanning
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Write SAST summary
        if: success()
        run: |
          {
            echo "### SAST"
            echo "- Semgrep completed with the default community rules plus the custom raw-request logging policy."
          } >> "${GITHUB_STEP_SUMMARY}"

  test:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    needs:
      - dependency-audit
      - sast
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.APP_DIR }}/requirements-dev.txt

      - name: Install test dependencies
        run: pip install -r ${{ env.APP_DIR }}/requirements-dev.txt

      - name: Run pytest with coverage gate
        run: |
          pytest ${{ env.APP_DIR }}/tests \
            --cov=${{ env.APP_DIR }} \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Write test summary
        if: success()
        run: |
          {
            echo "### Tests"
            echo "- Unit tests passed."
            echo "- Coverage threshold of ${{ env.COVERAGE_THRESHOLD }}% was satisfied."
          } >> "${GITHUB_STEP_SUMMARY}"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Save image as tarball for scanners
        run: docker save ${{ env.IMAGE_NAME }}:latest -o image.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: image.tar
          retention-days: 1

      - name: Write build summary
        if: success()
        run: |
          {
            echo "### Docker Build"
            echo "- Multi-stage image built successfully and tagged with the commit SHA."
          } >> "${GITHUB_STEP_SUMMARY}"

  image-scan:
    name: Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - name: Download built image
        uses: actions/download-artifact@v4
        with:
          name: built-image

      - name: Load image
        run: docker load -i image.tar

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          input: image.tar
          format: json
          output: trivy-report.json
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Write image scan summary
        if: success()
        run: |
          {
            echo "### Image Scan"
            echo "- Trivy completed with a blocking threshold of CRITICAL vulnerabilities."
          } >> "${GITHUB_STEP_SUMMARY}"

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ env.APP_DIR }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - secret-scan
      - dependency-audit
      - sast
      - test
      - docker-build
      - image-scan
      - sbom
    steps:
      - name: Write summary
        run: |
          {
            echo "## CI Pipeline Summary"
            echo ""
            echo "- Security gates run before Docker build so the workflow fails fast on unsafe code or dependencies."
            echo "- This phase is intentionally focused on CI pipeline evidence; deployment validation comes later."
            echo "- Artifacts available from the run: Semgrep SARIF, Trivy JSON, coverage XML, and SBOM."
          } >> "${GITHUB_STEP_SUMMARY}"
