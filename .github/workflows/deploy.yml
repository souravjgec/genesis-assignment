name: deploy

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  APP_DIR: app

jobs:
  checkov:
    name: Checkov
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov against Terraform
        run: |
          checkov \
            -d terraform \
            --framework terraform \
            --output json \
            --soft-fail-on LOW,MEDIUM,HIGH \
            --hard-fail-on CRITICAL > checkov_report.json

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov_report.json

      - name: Write Checkov summary
        if: success()
        run: |
          {
            echo "## Checkov Summary"
            echo ""
            echo "- Terraform scan completed before deployment."
            echo "- The workflow is configured to block only on CRITICAL Checkov findings."
            echo "- JSON report uploaded as the \`checkov-report\` artifact."
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy:
    name: Deploy
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    needs:
      - checkov
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Lambda package
        run: |
          python -m pip install --upgrade pip
          mkdir -p package
          pip install -r ${{ env.APP_DIR }}/requirements.txt --target package
          cp ${{ env.APP_DIR }}/main.py package/
          cd package
          zip -r ../lambda.zip .

      - name: Deploy Lambda artifact
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --zip-file "fileb://lambda.zip"

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda.zip
          retention-days: 3

      - name: Write deploy summary
        run: |
          {
            echo "## Deploy Summary"
            echo ""
            echo "- Deployment ran only because the CI workflow succeeded on a push to main."
            echo "- AWS authentication used GitHub OIDC via \`aws-actions/configure-aws-credentials\`."
            echo "- Lambda code was updated for function \`${{ secrets.LAMBDA_FUNCTION_NAME }}\`."
          } >> "${GITHUB_STEP_SUMMARY}"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - deploy
    environment: dev
    steps:
      - name: Probe /health endpoint
        run: |
          status_code=$(curl -sS -o response.json -w "%{http_code}" "${{ secrets.API_BASE_URL }}/health")
          cat response.json
          test "${status_code}" = "200"

      - name: Write smoke test summary
        run: |
          {
            echo "## Smoke Test Summary"
            echo ""
            echo "- Verified \`${{ secrets.API_BASE_URL }}/health\` returned HTTP 200 after deployment."
          } >> "${GITHUB_STEP_SUMMARY}"
